<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提交试卷 - Tus</title>
    <meta name="description" content="分享你手中的试题，帮助同学们一起备考！提交试卷到 Tus 北工大试卷共享平台，管理员审核后上线。">
    <link rel="icon" href="favicon.svg">
    <script>if(localStorage.getItem('tus_dark')==='1')document.documentElement.classList.add('dark')</script>
    <link rel="stylesheet" href="css/tailwind.css?v=4">
    <link rel="stylesheet" href="css/style.css?v=4">
    <link rel="stylesheet" href="css/announcement.css?v=4">
</head>
<body class="bg-gradient-to-br from-stone-100 to-amber-50/60 dark:from-stone-900 dark:to-stone-800 min-h-screen">
    <!-- 导航栏 -->
    <nav class="bg-white/80 dark:bg-[rgba(28,25,23,0.92)] backdrop-blur-sm border-b border-stone-200 dark:border-stone-700 sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="." class="text-2xl font-bold text-stone-800 dark:text-stone-100 tracking-tight">Tus</a>
            <div class="flex items-center gap-2">
                <span class="nav-announcement" id="navAnnouncement">公告</span>
                <button class="dark-toggle" id="darkToggle" aria-label="切换暗色模式">暗</button>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto px-4 py-10">
        <h1 class="text-3xl font-bold text-stone-800 dark:text-stone-100 mb-2">提交试卷</h1>
        <p class="text-stone-400 dark:text-stone-500 mb-8">分享你手中的试题，帮助同学们一起备考！提交后管理员会审核上线。</p>

        <form id="submitForm" class="bg-white dark:bg-stone-800 rounded-2xl shadow-sm border border-stone-100 dark:border-stone-700 p-8 space-y-5">
            <!-- 科目（搜索选择 + 输入新科目） -->
            <div>
                <label class="block text-sm font-medium text-stone-700 dark:text-stone-300 mb-1.5">所属科目 *</label>
                <div class="relative">
                    <input type="text" id="subjectSearch" autocomplete="off" placeholder="搜索已有科目，或直接输入新科目名称..."
                        class="w-full px-4 py-3 bg-white dark:bg-stone-800 border border-stone-200 dark:border-stone-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-400/50 focus:border-amber-300 shadow-sm text-stone-700 dark:text-stone-200 placeholder:text-stone-400 dark:placeholder:text-stone-500">
                    <input type="hidden" id="subjectHidden">
                    <div id="subjectDropdown" class="hidden absolute z-10 w-full mt-1 bg-white dark:bg-stone-800 border border-stone-200 dark:border-stone-600 rounded-xl shadow-lg max-h-60 overflow-y-auto">
                        <div id="dropdownItems" class="py-1"></div>
                    </div>
                </div>
                <p class="text-xs text-stone-400 dark:text-stone-500 mt-1.5">打字搜索已有科目，或直接输入新科目名称</p>
            </div>

            <!-- 年级 -->
            <div>
                <label class="block text-sm font-medium text-stone-700 dark:text-stone-300 mb-1.5">适用年级 *</label>
                <select id="paperGrade" required class="w-full px-4 py-3 bg-white dark:bg-stone-800 border border-stone-200 dark:border-stone-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-400/50 focus:border-amber-300 shadow-sm text-stone-700 dark:text-stone-200">
                    <option value="">请选择年级...</option>
                    <option value="大一">大一</option>
                    <option value="大二">大二</option>
                    <option value="大三">大三</option>
                    <option value="大四">大四</option>
                </select>
            </div>

            <!-- 试卷标题 -->
            <div>
                <label class="block text-sm font-medium text-stone-700 dark:text-stone-300 mb-1.5">试卷标题 *</label>
                <input type="text" id="paperTitle" required placeholder="例如：2024秋高等数学期末考试"
                    class="w-full px-4 py-3 bg-white dark:bg-stone-800 border border-stone-200 dark:border-stone-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-400/50 focus:border-amber-300 shadow-sm text-stone-700 dark:text-stone-200 placeholder:text-stone-400 dark:placeholder:text-stone-500">
            </div>

            <!-- 年份 + 学期 -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-stone-700 dark:text-stone-300 mb-1.5">年份 *</label>
                    <select id="paperYear" required class="w-full px-4 py-3 bg-white dark:bg-stone-800 border border-stone-200 dark:border-stone-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-400/50 focus:border-amber-300 shadow-sm text-stone-700 dark:text-stone-200"></select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-stone-700 dark:text-stone-300 mb-1.5">学期 *</label>
                    <select id="paperSemester" required class="w-full px-4 py-3 bg-white dark:bg-stone-800 border border-stone-200 dark:border-stone-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-400/50 focus:border-amber-300 shadow-sm text-stone-700 dark:text-stone-200">
                        <option value="上学期期末">上学期期末</option>
                        <option value="上学期期中">上学期期中</option>
                        <option value="下学期期末">下学期期末</option>
                        <option value="下学期期中">下学期期中</option>
                    </select>
                </div>
            </div>

            <!-- 教师 -->
            <div>
                <label class="block text-sm font-medium text-stone-700 dark:text-stone-300 mb-1.5">授课教师（选填）</label>
                <input type="text" id="paperTeacher" placeholder="例如：张老师"
                    class="w-full px-4 py-3 bg-white dark:bg-stone-800 border border-stone-200 dark:border-stone-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-400/50 focus:border-amber-300 shadow-sm text-stone-700 dark:text-stone-200 placeholder:text-stone-400 dark:placeholder:text-stone-500">
            </div>

            <!-- 你的名字 -->
            <div>
                <label class="block text-sm font-medium text-stone-700 dark:text-stone-300 mb-1.5">你的名字（选填）</label>
                <input type="text" id="paperUploader" placeholder="显示在试卷信息中"
                    class="w-full px-4 py-3 bg-white dark:bg-stone-800 border border-stone-200 dark:border-stone-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-400/50 focus:border-amber-300 shadow-sm text-stone-700 dark:text-stone-200 placeholder:text-stone-400 dark:placeholder:text-stone-500">
            </div>

            <!-- 试卷文件 -->
            <div>
                <label class="block text-sm font-medium text-stone-700 dark:text-stone-300 mb-1.5">试卷文件 *</label>
                <div id="dropZone" class="border-2 border-dashed border-stone-200 dark:border-stone-600 rounded-xl p-8 text-center cursor-pointer hover:border-amber-300 hover:bg-amber-50/30 dark:hover:bg-stone-700/30 transition-colors">
                    <p class="text-stone-500 dark:text-stone-400">点击选择或拖拽文件</p>
                    <p class="text-stone-400 dark:text-stone-500 text-sm mt-1">支持 PDF / Word（.doc .docx），最大 10MB</p>
                </div>
                <input type="file" id="fileInput" accept=".pdf,.doc,.docx" class="hidden">
                <div id="fileInfo" class="hidden mt-2 p-3 bg-amber-50 dark:bg-stone-700 rounded-xl flex items-center justify-between border border-amber-100 dark:border-stone-600">
                    <div>
                        <span id="fileName" class="text-sm font-medium text-amber-800 dark:text-amber-300"></span>
                        <span id="fileSize" class="text-sm text-amber-600 dark:text-amber-400 ml-2"></span>
                    </div>
                    <button type="button" id="removeFile" class="text-stone-400 dark:text-stone-500 hover:text-red-500 dark:hover:text-red-400 text-sm transition-colors">移除</button>
                </div>
            </div>

            <!-- 提交按钮 -->
            <button type="submit" id="submitBtn" class="w-full bg-yellow-600 dark:bg-yellow-500 text-stone-900 py-3.5 rounded-xl hover:bg-yellow-700 dark:hover:bg-yellow-400 font-medium disabled:opacity-40 transition-colors" disabled>
                提交试卷
            </button>
        </form>

        <!-- 提交进度 -->
        <div id="progressOverlay" class="hidden fixed inset-0 bg-black/20 backdrop-blur-sm flex items-center justify-center z-50">
            <div class="bg-white dark:bg-stone-800 rounded-2xl p-8 text-center max-w-sm shadow-xl">
                <div id="progressSpinner" class="animate-spin h-8 w-8 border-2 border-stone-400 dark:border-stone-600 border-t-transparent rounded-full mx-auto mb-4"></div>
                <p id="progressText" class="text-stone-600 dark:text-stone-300 font-medium">正在提交...</p>
            </div>
        </div>

        <!-- 提交成功 -->
        <div id="successModal" class="hidden fixed inset-0 bg-black/20 backdrop-blur-sm flex items-center justify-center z-50">
            <div class="bg-white dark:bg-stone-800 rounded-2xl p-8 text-center max-w-sm shadow-xl">
                <h3 class="text-xl font-bold text-stone-800 dark:text-stone-100 mb-2">提交成功</h3>
                <p class="text-stone-500 dark:text-stone-400 mb-2">感谢你的分享！</p>
                <p class="text-stone-400 dark:text-stone-500 text-sm mb-6">管理员审核后会尽快上线试卷</p>
                <a href="." class="inline-block bg-yellow-600 dark:bg-yellow-500 text-stone-900 px-8 py-3 rounded-xl hover:bg-yellow-700 dark:hover:bg-yellow-400 transition-colors font-medium">返回首页</a>
            </div>
        </div>

        <!-- 提交失败 -->
        <div id="errorModal" class="hidden fixed inset-0 bg-black/20 backdrop-blur-sm flex items-center justify-center z-50">
            <div class="bg-white dark:bg-stone-800 rounded-2xl p-8 text-center max-w-sm shadow-xl">
                <h3 class="text-xl font-bold text-stone-800 dark:text-stone-100 mb-2">提交失败</h3>
                <p id="errorText" class="text-stone-500 dark:text-stone-400 mb-6">请稍后重试</p>
                <button onclick="location.reload()" class="bg-yellow-600 dark:bg-yellow-500 text-stone-900 px-8 py-3 rounded-xl hover:bg-yellow-700 dark:hover:bg-yellow-400 transition-colors font-medium">刷新重试</button>
            </div>
        </div>
    </main>

    <footer class="text-center py-8 text-stone-400 dark:text-stone-500 text-xs">
        <p>Tus · 北京工业大学试卷共享平台</p>
    </footer>

    <script src="js/api-client.js?v=4"></script>
    <script src="js/submit.js?v=4"></script>
    <script src="js/announcement.js?v=4"></script>
    <script src="js/ui.js?v=4"></script>
</body>
</html>
