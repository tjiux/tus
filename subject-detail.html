<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>试卷列表 - Tus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gradient-to-br from-slate-50 to-stone-50 min-h-screen">
    <!-- 导航栏 -->
    <nav class="bg-white/80 backdrop-blur-sm border-b border-slate-200 sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="." class="text-2xl font-bold text-slate-800 tracking-tight">Tus</a>
            <div class="flex gap-2">
                <a href="submit.html" class="bg-amber-600 text-white px-4 py-2 rounded-lg hover:bg-amber-700 text-sm font-medium transition-colors">提交试卷</a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-10">
        <!-- 科目信息 -->
        <div class="mb-8">
            <a href="." class="text-slate-500 hover:text-slate-700 text-sm transition-colors">&larr; 返回所有科目</a>
            <h1 id="subjectTitle" class="text-3xl font-bold text-slate-800 mt-2">加载中...</h1>
            <p id="subjectTeacher" class="text-slate-400 mt-1 text-sm"></p>
            <p id="subjectDescription" class="text-slate-500 mt-2"></p>
        </div>

        <!-- 筛选工具栏 -->
        <div class="flex flex-wrap gap-3 mb-6 items-center">
            <select id="yearFilter" class="px-4 py-2.5 bg-white border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-400/50 focus:border-amber-300 shadow-sm text-slate-600">
                <option value="">全部年份</option>
            </select>
            <select id="semesterFilter" class="px-4 py-2.5 bg-white border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-400/50 focus:border-amber-300 shadow-sm text-slate-600">
                <option value="">全部学期</option>
                <option value="上学期期中">上学期期中</option>
                <option value="上学期期末">上学期期末</option>
                <option value="下学期期中">下学期期中</option>
                <option value="下学期期末">下学期期末</option>
            </select>
            <input type="text" id="searchPaper" placeholder="搜索试卷标题..." class="px-4 py-2.5 bg-white border border-slate-200 rounded-xl text-sm flex-1 min-w-[200px] focus:outline-none focus:ring-2 focus:ring-amber-400/50 focus:border-amber-300 shadow-sm placeholder:text-slate-400">
        </div>

        <!-- 试卷列表 -->
        <div id="papersContainer" class="space-y-3">
            <!-- 由 JS 动态渲染 -->
        </div>

        <!-- 加载状态 -->
        <div id="loadingState" class="text-center py-20">
            <div class="animate-spin h-8 w-8 border-2 border-slate-400 border-t-transparent rounded-full mx-auto mb-4"></div>
            <p class="text-slate-400 text-sm">加载中...</p>
        </div>

        <!-- 空状态 -->
        <div id="emptyState" class="text-center py-20 hidden">
            <div class="text-5xl mb-4 opacity-60">📄</div>
            <p class="text-slate-500 text-lg">暂无试卷</p>
            <p class="text-slate-400 mt-2 text-sm">去做第一个上传试卷的人吧！</p>
        </div>

        <!-- 错误状态 -->
        <div id="errorState" class="text-center py-20 hidden">
            <div class="text-5xl mb-4 opacity-60">😵</div>
            <p class="text-red-500 text-lg">加载失败</p>
            <p class="text-slate-400 mt-2 text-sm" id="errorMessage">请检查网络连接后刷新页面</p>
            <button onclick="location.reload()" class="mt-4 bg-slate-700 text-white px-6 py-2 rounded-lg hover:bg-slate-800 transition-colors text-sm">刷新重试</button>
        </div>
    </main>

    <footer class="text-center py-8 text-slate-400 text-xs">
        <p>Tus · 北京工业大学试卷共享平台</p>
    </footer>

    <script src="js/api-client.js"></script>
    <script src="js/subject-detail.js"></script>
</body>
</html>
