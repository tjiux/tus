<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>试卷列表 - Tus</title>
    <meta name="description" content="按科目浏览试卷 - Tus 北工大试卷共享平台，北京工业大学历年期中期末试题免费下载。">
    <link rel="icon" href="favicon.svg">
    <script>if(localStorage.getItem('tus_dark')==='1')document.documentElement.classList.add('dark')</script>
    <link rel="stylesheet" href="css/tailwind.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/announcement.css?v=3">
</head>
<body class="bg-gradient-to-br from-stone-100 to-amber-50/60 dark:from-stone-900 dark:to-stone-800 min-h-screen">
    <!-- 导航栏 -->
    <nav class="bg-white/80 dark:bg-[rgba(28,25,23,0.92)] backdrop-blur-sm border-b border-stone-200 dark:border-stone-700 sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="." class="text-2xl font-bold text-stone-800 dark:text-stone-100 tracking-tight">Tus</a>
            <div class="flex items-center gap-3">
                <span class="nav-announcement" id="navAnnouncement">公告</span>
                <button class="dark-toggle" id="darkToggle" aria-label="切换暗色模式">🌙</button>
                <a href="submit.html" class="bg-amber-700 text-white px-4 py-2.5 rounded-lg hover:bg-amber-800 text-sm font-medium transition-colors">提交试卷</a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-10">
        <!-- 科目信息 -->
        <div class="mb-8">
            <a href="." class="text-stone-500 dark:text-stone-400 hover:text-stone-700 dark:hover:text-stone-300 text-sm transition-colors">&larr; 返回所有科目</a>
            <h1 id="subjectTitle" class="text-3xl font-bold text-stone-800 dark:text-stone-100 mt-2">加载中...</h1>
            <p id="subjectTeacher" class="text-stone-400 dark:text-stone-500 mt-1 text-sm"></p>
            <p id="subjectDescription" class="text-stone-500 dark:text-stone-400 mt-2"></p>
        </div>

        <!-- 筛选工具栏 -->
        <div class="flex flex-wrap gap-3 mb-6 items-center">
            <select id="yearFilter" aria-label="按年份筛选" class="px-4 py-2.5 bg-white dark:bg-stone-800 border border-stone-200 dark:border-stone-600 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-400/50 focus:border-amber-300 shadow-sm text-stone-600 dark:text-stone-300">
                <option value="">全部年份</option>
            </select>
            <select id="semesterFilter" aria-label="按学期筛选" class="px-4 py-2.5 bg-white dark:bg-stone-800 border border-stone-200 dark:border-stone-600 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-400/50 focus:border-amber-300 shadow-sm text-stone-600 dark:text-stone-300">
                <option value="">全部学期</option>
                <option value="上学期期中">上学期期中</option>
                <option value="上学期期末">上学期期末</option>
                <option value="下学期期中">下学期期中</option>
                <option value="下学期期末">下学期期末</option>
            </select>
            <input type="text" id="searchPaper" placeholder="搜索试卷标题..." class="px-4 py-2.5 bg-white dark:bg-stone-800 border border-stone-200 dark:border-stone-600 rounded-xl text-sm flex-1 min-w-[200px] focus:outline-none focus:ring-2 focus:ring-amber-400/50 focus:border-amber-300 shadow-sm text-stone-600 dark:text-stone-300 placeholder:text-stone-400 dark:placeholder:text-stone-500">
        </div>

        <!-- 试卷列表 -->
        <div id="papersContainer" class="grid grid-cols-1 gap-3">
            <!-- 由 JS 动态渲染 -->
        </div>

        <!-- 加载状态 -->
        <div id="loadingState" class="text-center py-20">
            <div class="animate-spin h-8 w-8 border-2 border-stone-400 dark:border-stone-600 border-t-transparent rounded-full mx-auto mb-4"></div>
            <p class="text-stone-400 dark:text-stone-500 text-sm">加载中...</p>
        </div>

        <!-- 空状态 -->
        <div id="emptyState" class="text-center py-20 hidden">
            <div class="text-4xl mb-3 opacity-60">📭</div>
            <p class="text-stone-500 dark:text-stone-400 font-medium">暂无试卷</p>
            <p class="text-stone-400 dark:text-stone-500 text-sm mt-2">去做第一个上传试卷的人吧！</p>
            <a href="submit.html" class="inline-block mt-4 bg-amber-700 text-white px-5 py-2.5 rounded-lg hover:bg-amber-800 text-sm font-medium transition-colors">去提交新试卷</a>
        </div>

        <!-- 错误状态 -->
        <div id="errorState" class="text-center py-20 hidden">
            <div class="text-5xl mb-4 opacity-60">😵</div>
            <p class="text-red-500 text-lg">加载失败</p>
            <p class="text-stone-400 dark:text-stone-500 mt-2 text-sm" id="errorMessage">请检查网络连接后刷新页面</p>
            <button onclick="location.reload()" class="mt-4 bg-stone-700 dark:bg-stone-600 text-white px-6 py-2.5 rounded-lg hover:bg-stone-800 dark:hover:bg-stone-500 transition-colors text-sm">刷新重试</button>
        </div>
    </main>

    <footer class="text-center py-8 text-stone-400 dark:text-stone-500 text-xs">
        <p>Tus · 北京工业大学试卷共享平台</p>
    </footer>

    <script src="js/api-client.js"></script>
    <script src="js/subject-detail.js"></script>
    <script src="js/announcement.js?v=2"></script>
    <script src="js/ui.js"></script>
</body>
</html>
