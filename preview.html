<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 预览 - Tus</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { display: flex; flex-direction: column; height: 100vh; background: #525252; }
        embed { flex: 1; width: 100%; border: none; }
        .bar {
            background: #292524; color: #d6cec4;
            padding: 10px 18px; font-family: 'Noto Serif SC', 'SimSun', serif;
            font-size: 13px; display: flex; align-items: center;
            flex-shrink: 0; gap: 12px;
        }
        .bar .status { color: #8a7e72; font-size: 12px; }
        .bar a { color: #facc15; text-decoration: none; margin-left: auto; font-size: 13px; }
        .bar a:hover { text-decoration: underline; }
        .loading {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 16px;
            color: #a69a8e; font-family: 'Noto Serif SC', serif; font-size: 15px;
        }
        .loading .spinner {
            width: 32px; height: 32px;
            border: 3px solid #4a4038; border-top-color: #facc15;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading .src-label { font-size: 12px; color: #78716c; }
    </style>
</head>
<body>
    <div class="bar">
        <span>Tus · PDF 预览</span>
        <span class="status" id="status">准备中…</span>
        <a href="#" id="downloadLink" target="_blank">📥 下载</a>
    </div>
    <div id="viewerWrap" class="loading">
        <div class="spinner"></div>
        <span id="loadMsg">正在加载…</span>
        <span class="src-label" id="srcLabel"></span>
    </div>
    <embed id="pdfViewer" type="application/pdf" style="display:none;">

    <script>
    (function() {
        var params = new URLSearchParams(location.search);
        var ghUrl = params.get('url');
        if (!ghUrl) {
            document.getElementById('status').textContent = '❌ 缺少参数';
            return;
        }

        document.getElementById('downloadLink').href = ghUrl;

        // 从 GitHub Pages URL 推导 jsDelivr URL
        // ghUrl: https://HaximTus.github.io/tus/assets/papers/pending/file.pdf
        // jsdUrl: https://cdn.jsdelivr.net/gh/HaximTus/tus@main/assets/papers/pending/file.pdf
        var match = ghUrl.match(/https:\/\/([^\/]+)\.github\.io\/([^\/]+)\/(.+)/);
        var jsdUrl = null;
        if (match) {
            jsdUrl = 'https://cdn.jsdelivr.net/gh/' + match[1] + '/' + match[2] + '@main/' + match[3];
        }

        var statusEl = document.getElementById('status');
        var loadMsg = document.getElementById('loadMsg');
        var srcLabel = document.getElementById('srcLabel');

        function loadFrom(url, label) {
            statusEl.textContent = '⏬ ' + label;
            loadMsg.textContent = '正在从 ' + label + ' 获取…';
            srcLabel.textContent = url;

            // 3 秒超时，失败则切换到下一个源
            var controller = new AbortController();
            var timer = setTimeout(function() { controller.abort(); }, 3000);

            return fetch(url, { redirect: 'follow', signal: controller.signal }).then(function(resp) {
                clearTimeout(timer);
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                return resp.blob();
            }).then(function(blob) {
                clearTimeout(timer);
                var pdfBlob = new Blob([blob], { type: 'application/pdf' });
                var blobUrl = URL.createObjectURL(pdfBlob);
                var embed = document.getElementById('pdfViewer');
                embed.src = blobUrl;
                embed.style.display = '';
                document.getElementById('viewerWrap').style.display = 'none';
                statusEl.textContent = '✅ ' + label;
            });
        }

        var attempts = [];
        if (jsdUrl) attempts.push({ url: jsdUrl, label: 'jsDelivr CDN' });
        attempts.push({ url: ghUrl, label: 'GitHub Pages' });

        function tryNext(idx) {
            if (idx >= attempts.length) {
                document.getElementById('viewerWrap').innerHTML =
                    '❌ 所有源都加载失败。' +
                    '尝试 <a href="' + ghUrl + '" target="_blank" style="color:#facc15;">直接打开文件</a>' +
                    ' 或 <a href="' + ghUrl + '" download style="color:#facc15;margin-left:8px;">下载</a>';
                statusEl.textContent = '❌ 失败';
                return;
            }
            var attempt = attempts[idx];
            loadFrom(attempt.url, attempt.label)
                .catch(function(err) {
                    console.warn(attempt.label + ' 失败:', err.message);
                    tryNext(idx + 1);
                });
        }

        tryNext(0);
    })();
    </script>
</body>
</html>
