<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 预览 - Tus</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { display: flex; flex-direction: column; height: 100vh; background: #525252; }
        embed { flex: 1; width: 100%; border: none; }
        .bar {
            background: #292524; color: #d6cec4;
            padding: 10px 18px; font-family: 'Noto Serif SC', 'SimSun', serif;
            font-size: 13px; display: flex; align-items: center;
            flex-shrink: 0;
        }
        .bar a { color: #facc15; text-decoration: none; margin-left: auto; font-size: 13px; }
        .bar a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="bar">
        Tus · PDF 预览
        <a href="#" id="downloadLink" target="_blank">📥 下载</a>
    </div>
    <embed id="pdfViewer" type="application/pdf">
    <script>
        var params = new URLSearchParams(location.search);
        var url = params.get('url');
        if (url) {
            document.getElementById('pdfViewer').src = url;
            document.getElementById('downloadLink').href = url;
        }
    </script>
</body>
</html>
