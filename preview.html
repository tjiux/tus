<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 预览 - Tus</title>
    <script>if(location.protocol==='http:'&&location.hostname!=='localhost'&&location.hostname!=='127.0.0.1')location.href=location.href.replace(/^http:/,'https:')</script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { display: flex; flex-direction: column; height: 100vh; background: #525252; }
        embed { flex: 1; width: 100%; border: none; }
        .bar {
            background: #292524; color: #d6cec4;
            padding: 10px 18px; font-family: 'Noto Serif SC', 'SimSun', serif;
            font-size: 13px; display: flex; align-items: center;
            flex-shrink: 0; gap: 12px;
        }
        .bar .status { color: #8a7e72; font-size: 12px; }
        .bar a { color: #facc15; text-decoration: none; margin-left: auto; font-size: 13px; }
        .bar a:hover { text-decoration: underline; }
        .loading {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 16px;
            color: #a69a8e; font-family: 'Noto Serif SC', serif; font-size: 15px;
        }
        .loading .spinner {
            width: 32px; height: 32px;
            border: 3px solid #4a4038; border-top-color: #facc15;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading .src-label { font-size: 12px; color: #78716c; }
    </style>
</head>
<body>
    <script>(function(){if(window.self!==window.top){var b=document.querySelector('.bar');if(b)b.style.display='none'}})()</script>
    <div class="bar">
        <span>Tus · PDF 预览</span>
        <span class="status" id="status">准备中…</span>
        <a href="#" id="downloadLink" target="_blank">📥 下载</a>
    </div>
    <div id="viewerWrap" class="loading">
        <div class="spinner"></div>
        <span id="loadMsg">正在加载…</span>
        <span class="src-label" id="srcLabel"></span>
    </div>
    <embed id="pdfViewer" type="application/pdf" style="display:none;">

    <script>
    (function() {
        var params = new URLSearchParams(location.search);
        var ghUrl = params.get('url');
        if (!ghUrl) {
            document.getElementById('status').textContent = '❌ 缺少参数';
            return;
        }

        document.getElementById('downloadLink').href = ghUrl;

        // 解析 GitHub Pages URL，构造多种回源地址
        // ghUrl: https://HaximTus.github.io/tus/assets/papers/file.pdf
        var match = ghUrl.match(/https:\/\/([^\/]+)\.github\.io\/([^\/]+)\/(.+)/);
        var repoWithOwner = null;
        var filePath = null;
        if (match) {
            repoWithOwner = match[1] + '/' + match[2];  // HaximTus/tus
            filePath = match[3];                         // assets/papers/file.pdf
        }

        var statusEl = document.getElementById('status');
        var loadMsg = document.getElementById('loadMsg');
        var srcLabel = document.getElementById('srcLabel');

        function loadFrom(url, label, timeoutMs) {
            statusEl.textContent = '⏬ ' + label;
            loadMsg.textContent = '正在从 ' + label + ' 获取…';
            srcLabel.textContent = url;

            var controller = new AbortController();
            var timer = setTimeout(function() { controller.abort(); }, timeoutMs || 6000);

            return fetch(url, { redirect: 'follow', signal: controller.signal }).then(function(resp) {
                clearTimeout(timer);
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                return resp.blob();
            }).then(function(blob) {
                clearTimeout(timer);
                var pdfBlob = new Blob([blob], { type: 'application/pdf' });
                var blobUrl = URL.createObjectURL(pdfBlob);
                var embed = document.getElementById('pdfViewer');
                embed.src = blobUrl;
                embed.style.display = '';
                document.getElementById('viewerWrap').style.display = 'none';
                statusEl.textContent = '✅ ' + label;
            });
        }

        // 构建回源列表：CDN → 自定义域名直连 → embed 兜底
        var attempts = [];

        // 1) jsDelivr CDN（在中国有时慢，需要 URL 编码中文路径）
        if (repoWithOwner && filePath) {
            var encodedPath = encodeURI(filePath);
            attempts.push({
                url: 'https://cdn.jsdelivr.net/gh/' + repoWithOwner + '@main/' + encodedPath,
                label: 'jsDelivr CDN',
                timeout: 8000
            });
        }

        // 2) raw.githubusercontent.com（GitHub 原始文件，通常中国可访问）
        if (repoWithOwner && filePath) {
            var encodedPath = encodeURI(filePath);
            attempts.push({
                url: 'https://raw.githubusercontent.com/' + repoWithOwner + '/main/' + encodedPath,
                label: 'GitHub Raw',
                timeout: 6000
            });
        }

        // 3) 自定义域名 HTTPS 直连
        //    当 ghUrl 是 github.io URL 时，301 会跳到 http://haximtus.cn（HTTP！）
        //    所以我们手动构造 HTTPS URL 绕过跳转
        if (filePath) {
            attempts.push({
                url: 'https://haximtus.cn/' + filePath,
                label: 'haximtus.cn',
                timeout: 5000
            });
        }

        function tryNext(idx) {
            if (idx >= attempts.length) {
                // 所有 fetch 都失败，直接用 embed 加载源文件（浏览器原生 PDF 阅读器）
                // 注意：ghUrl 本身是 github.io，会被跳转到 HTTP，但 embed 在某些浏览器仍可工作
                document.getElementById('viewerWrap').style.display = 'none';
                var embed = document.getElementById('pdfViewer');
                embed.src = ghUrl;
                embed.style.display = '';
                statusEl.textContent = '✅ 直接加载';
                return;
            }
            var attempt = attempts[idx];
            loadFrom(attempt.url, attempt.label, attempt.timeout)
                .catch(function(err) {
                    console.warn(attempt.label + ' 失败:', err.message);
                    tryNext(idx + 1);
                });
        }

        tryNext(0);
    })();
    </script>
</body>
</html>
