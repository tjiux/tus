<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新建科目 - Tus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gradient-to-br from-slate-50 to-stone-50 min-h-screen">
    <!-- 导航栏 -->
    <nav class="bg-white/80 backdrop-blur-sm border-b border-slate-200 sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="." class="text-2xl font-bold text-slate-800 tracking-tight">Tus</a>
            <div class="flex gap-2">
                <a href="submit.html" class="bg-amber-600 text-white px-4 py-2 rounded-lg hover:bg-amber-700 text-sm font-medium transition-colors">提交试卷</a>
            </div>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto px-4 py-10">
        <h1 class="text-3xl font-bold text-slate-800 mb-6">📖 新建科目</h1>

        <div class="bg-amber-50 border border-amber-200 rounded-2xl p-6 mb-6">
            <div class="flex items-start gap-3">
                <div class="text-2xl">💡</div>
                <div>
                    <h3 class="font-medium text-amber-800 mb-2">需要运行管理脚本来添加科目</h3>
                    <p class="text-amber-700 text-sm mb-3">由于网站部署在 GitHub Pages（纯静态），添加科目需要通过管理脚本操作。</p>
                    <div class="bg-white rounded-xl p-4 text-sm font-mono text-slate-700 border border-amber-100">
                        <p class="mb-2">在项目目录打开终端，运行：</p>
                        <code class="block bg-slate-50 p-3 rounded-lg border border-slate-200 text-amber-700">
                            node scripts/manage.js
                        </code>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
            <h3 class="font-semibold text-slate-800 mb-4">管理脚本支持的功能：</h3>
            <ul class="space-y-3 text-slate-600">
                <li class="flex items-start gap-2">
                    <span class="text-emerald-500">✅</span>
                    <span><strong>列出所有科目</strong> — 查看当前已有的科目和试卷数量</span>
                </li>
                <li class="flex items-start gap-2">
                    <span class="text-emerald-500">✅</span>
                    <span><strong>新建科目</strong> — 填写科目名称、年级、授课教师</span>
                </li>
                <li class="flex items-start gap-2">
                    <span class="text-emerald-500">✅</span>
                    <span><strong>添加试卷</strong> — 选择科目，填写信息，拷贝 PDF 到指定目录</span>
                </li>
                <li class="flex items-start gap-2">
                    <span class="text-emerald-500">✅</span>
                    <span><strong>查看待审核提交</strong> — 审核同学们提交的试卷</span>
                </li>
                <li class="flex items-start gap-2">
                    <span class="text-emerald-500">✅</span>
                    <span><strong>部署到 GitHub</strong> — 一键提交并推送更新</span>
                </li>
            </ul>
        </div>
    </main>

    <footer class="text-center py-8 text-slate-400 text-xs">
        <p>Tus · 北京工业大学试卷共享平台</p>
    </footer>
</body>
</html>
